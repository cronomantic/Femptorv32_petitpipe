# SPDX-License-Identifier: BSD-3-Clause
# GitHub Actions CI pipeline for FemptorV32_petitpipe
#
# Jobs
# ----
#   testbench-syntax  Compile testbench + stub with Verilator
#   compile-tests     Cross-compile all RV32I assembly tests
#   simulate          Run full simulation (enabled when RTL is merged)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Restrict the default GITHUB_TOKEN permissions to read-only
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Job 1 – verify that the testbench and memory model compile without errors
  # --------------------------------------------------------------------------
  testbench-syntax:
    name: Testbench Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y verilator build-essential

      - name: Check testbench syntax (stub build)
        run: make tb-check

  # --------------------------------------------------------------------------
  # Job 2 – cross-compile all RV32I assembly test programs
  # --------------------------------------------------------------------------
  compile-tests:
    name: Compile RV32I Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install RISC-V toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf

      - name: Compile all test programs
        run: make compile

      - name: Upload compiled test artefacts
        uses: actions/upload-artifact@v4
        with:
          name: test-binaries
          path: |
            build/elfs/
            build/hexes/
            build/disasm/

  # --------------------------------------------------------------------------
  # Job 3 – full simulation (requires RTL in rtl/)
  #
  # This job is intentionally disabled until the processor RTL is committed.
  # To enable it:
  #   1. Add FemptorV32_petitpipe.v (and any sub-modules) to the rtl/ directory.
  #   2. Remove the `if: false` condition below.
  # --------------------------------------------------------------------------
  simulate:
    name: Run Simulation Tests
    runs-on: ubuntu-latest
    needs: [testbench-syntax, compile-tests]
    #if: false  # TODO: remove when RTL is available in rtl/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install simulation tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            verilator \
            build-essential \
            gcc-riscv64-unknown-elf \
            binutils-riscv64-unknown-elf

      - name: Compile tests and run simulation
        run: make sim

      - name: Upload simulation logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulation-results
          path: build/results/
